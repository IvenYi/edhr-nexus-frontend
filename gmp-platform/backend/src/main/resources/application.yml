server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: edhr
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

# Application-level settings
app:
  tenant:
    default-id: default
  jwt:
    secret: ${JWT_SECRET:edhr-phase0-jwt-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size: 10MB

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: edhr-postgres
    environment:
      POSTGRES_DB: edhr_dev
      POSTGRES_USER: edhr
      POSTGRES_PASSWORD: edhr_dev_pwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edhr -d edhr_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edhr-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/edhr_dev
      SPRING_DATASOURCE_USERNAME: edhr
      SPRING_DATASOURCE_PASSWORD: edhr_dev_pwd
      JWT_SECRET: docker-edhr-jwt-secret-change-in-production
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edhr-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
